name: Release

on:
  release:
    types:
      - published

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  NUGET_XMLDOC_MODE: skip
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  release:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      id-token: write # to use OIDC

    steps:
      - uses: actions/checkout@v7.0.0
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: |
            10.x
            8.x
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Login to NuGet (with OIDC)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 #v1.2.0
        id: nuget_login
        with:
          user: ${{ vars.NUGET_USER_NAME }}

      - name: Restore
        run: dotnet restore
      - name: Release Build & Pack
        run: dotnet pack ./src/Nogic.WritableOptions/Nogic.WritableOptions.csproj -c Release --no-restore --output nupkgs -p:Version=${TAG_VERSION:1} -p:AssemblyName=Nogic.WritableOptions
        env:
          TAG_VERSION: ${{ github.event.release.tag_name }} # v0.0.0-abc

      - name: Generate Attestation for packages
        uses: actions/attest@v4.1.0
        with:
          subject-path: "nupkgs/*.nupkg"

      - name: Publish to NuGet
        run: dotnet nuget push "nupkgs/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }}
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: packages
          path: nupkgs/
          include-hidden-files: true
