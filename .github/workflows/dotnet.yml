name: .NET CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  pull_request:
    paths-ignore:
      - "**.md"

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  NUGET_XMLDOC_MODE: skip
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-slim
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7.0.0
      - name: Setup .NET SDK # detected from global.json
        uses: actions/setup-dotnet@v5.3.0
      - name: Restore .NET tools
        run: dotnet tool restore
      - name: Add Problem Matcher for dotnet-format
        run: echo "::add-matcher::.github/dotnet-format.json"

      - name: Lint with dotnet-format
        run: |
          dotnet format style --verify-no-changes --verbosity detailed
          dotnet format analyzers --verify-no-changes --verbosity detailed

      - name: Format Check with csharpier
        run: dotnet csharpier check . --log-format msbuild

  test:
    name: Debug Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - windows-11-arm
          - macos-latest
          - macos-15-intel
        framework:
          - net10.0
          - net8.0
        include:
          - os: windows-latest
            framework: net48
    permissions:
      contents: read
      id-token: write # to use OIDC

    steps:
      - uses: actions/checkout@v7.0.0
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: |
            10.x
            8.x
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Restore
        run: dotnet restore
      - name: Debug Build
        run: dotnet build --no-restore
      - name: Test
        run: dotnet test -f ${{ matrix.framework }} --no-build --coverage --coverage-output-format cobertura --coverage-output cobertura.xml --results-directory ./TestResults/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7.0.0
        if: ${{ !cancelled() }}
        with:
          use_oidc: true
          disable_search: true
          files: ./TestResults/cobertura.xml
          flags: ${{ runner.os }},${{ runner.arch }},${{ matrix.framework }}
